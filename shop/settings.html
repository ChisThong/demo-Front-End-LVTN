<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt gian hàng | Kênh Người Bán</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .settings-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }
        .settings-nav {
            background: white;
            padding: 1.5rem;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            align-self: start;
        }
        .settings-nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 12px;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 8px;
        }
        .settings-nav-item:hover {
            background: rgba(0,0,0,0.02);
            color: var(--text-dark);
        }
        .settings-nav-item.active {
            background: var(--primary);
            color: white;
        }
        
        .settings-section {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
        }
        .settings-title {
            font-size: 1.5rem;
            color: var(--sidebar-bg);
            font-weight: 800;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(163, 67, 45, 0.1);
        }
        
        .avatar-upload {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 2rem;
        }
        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #eee;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .btn-upload {
            background: white;
            border: 1px solid #ddd;
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-upload:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo" onclick="window.location.href='../index.html'" style="cursor: pointer;">
                <span class="logo-icon">🌴</span>
                <span class="logo-text">Seller<span>Hub</span></span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i data-lucide="layout-dashboard"></i> Tổng quan</a>
                <a href="products.html"><i data-lucide="package"></i> Quản lý sản phẩm</a>
                <a href="orders.html"><i data-lucide="shopping-bag"></i> Đơn hàng</a>
                <a href="reviews.html"><i data-lucide="star"></i> Đánh giá</a>
                <a href="statistics.html"><i data-lucide="bar-chart-3"></i> Thống kê</a>
                <a href="settings.html" class="active"><i data-lucide="settings"></i> Cài đặt gian hàng</a>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn"><i data-lucide="log-out"></i> Đăng xuất</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <header class="dashboard-header">
                <div class="header-search">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Tìm kiếm cài đặt...">
                </div>
                <div class="header-actions">
                    <button class="home-btn" onclick="window.location.href='../index.html'">
                        <i data-lucide="home"></i>
                        <span>Về trang chủ</span>
                    </button>
                    <button class="notification-btn"><i data-lucide="bell"></i></button>
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Ba+Ba+Bến+Tre&background=D44E28&color=fff" alt="Avatar">
                        <span>Cô Ba Bến Tre</span>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <h2 style="font-size: 2rem; color: var(--sidebar-bg); font-weight: 800; margin-bottom: 2rem;">Cài đặt gian hàng</h2>
                
                <div class="settings-grid">
                    <div class="settings-nav">
                        <div class="settings-nav-item active">
                            <i data-lucide="store" size="20"></i> Thông tin cơ bản
                        </div>
                        <div class="settings-nav-item">
                            <i data-lucide="map-pin" size="20"></i> Địa chỉ & Vận chuyển
                        </div>
                        <div class="settings-nav-item">
                            <i data-lucide="credit-card" size="20"></i> Thanh toán
                        </div>
                        <div class="settings-nav-item">
                            <i data-lucide="bell" size="20"></i> Thông báo
                        </div>
                    </div>

                    <div class="settings-section">
                        <h3 class="settings-title">Hồ sơ Cửa hàng</h3>
                        
                        <div class="avatar-upload">
                            <img src="https://ui-avatars.com/api/?name=Ba+Ba+Bến+Tre&background=D44E28&color=fff&size=200" class="avatar-preview">
                            <div>
                                <h4 style="margin-bottom: 8px;">Ảnh đại diện gian hàng</h4>
                                <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 12px;">Định dạng JPG, PNG. Kích thước tối đa 2MB.</p>
                                <button class="btn-upload">Thay đổi ảnh</button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Tên gian hàng</label>
                            <input type="text" class="form-control" value="Nam Bộ Specialties - Đặc Sản Miền Tây">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Mô tả ngắn</label>
                            <textarea class="form-control" rows="4">Chuyên cung cấp các đặc sản chính gốc miền Tây Nam Bộ như Kẹo Dừa Bến Tre, Bánh Tráng Phơi Sương, Nem Lai Vung... Cam kết chất lượng và hương vị truyền thống.</textarea>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                            <div class="form-group">
                                <label class="form-label">Email liên hệ</label>
                                <input type="email" class="form-control" value="contact@nambospecialties.vn">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Số điện thoại</label>
                                <input type="text" class="form-control" value="0987 654 321">
                            </div>
                        </div>

                        <div style="text-align: right; margin-top: 2rem;">
                            <button class="btn-primary" style="padding: 1rem 2rem; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 1.05rem; cursor: pointer; box-shadow: 0 5px 15px rgba(163, 67, 45, 0.3);">
                                Lưu Thay Đổi
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
