<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng | NamBộ Specialties</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cart.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="cart-page-body">
    <!-- Navbar -->
    <nav id="navbar" class="scrolled">
        <div class="nav-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <span class="logo-icon">🌴</span>
                <span class="logo-text">NamBộ<span>Specialties</span></span>
            </div>
            <div class="nav-links">
                <a href="index.html">Trang chủ</a>
                <a href="about.html">Giới thiệu</a>
                <a href="specialties.html">Đặc sản</a>
                <a href="map.html">Bản đồ đặc sản</a>
                <a href="intro.html">Câu chuyện sản vật</a>
            </div>
            <div class="nav-actions">
                <button class="search-btn" id="searchBtn"><i data-lucide="search"></i></button>
                <button class="cart-btn" id="cartBtn" onclick="window.location.href='cart.html'">
                    <i data-lucide="shopping-cart"></i>
                    <span class="cart-count">3</span>
                </button>
                <button class="login-btn" onclick="window.location.href='login.html'">Đăng nhập</button>
                <button class="seller-btn" id="sellerBtn" onclick="window.location.href='shop/dashboard.html'">Kênh người bán</button>
            </div>
        </div>
    </nav>

    <main class="cart-page-wrapper">
        <!-- Progress Bar Box -->
        <div class="cart-box progress-box">
            <div class="step active">
                <div class="step-icon"><i data-lucide="shopping-cart"></i></div>
                <span>GIỎ HÀNG</span>
            </div>
            <div class="step-line"></div>
            <div class="step">
                <div class="step-icon"><i data-lucide="clipboard-check"></i></div>
                <span>XÁC NHẬN</span>
            </div>
            <div class="step-line"></div>
            <div class="step">
                <div class="step-icon"><i data-lucide="check-circle"></i></div>
                <span>HOÀN TẤT</span>
            </div>
        </div>

        <!-- Header Box -->
        <div class="cart-box header-box">
            <div class="header-left">
                <div class="header-icon-container">
                    <div class="header-icon"><i data-lucide="shopping-cart"></i></div>
                    <span class="badge" id="header-badge">0</span>
                </div>
                <div class="header-text">
                    <h2>Giỏ hàng</h2>
                    <p id="header-count">0 sản phẩm</p>
                </div>
            </div>
            <button class="continue-btn" onclick="window.location.href='specialties.html'">
                <i data-lucide="lock"></i> Tiếp tục mua sắm
            </button>
        </div>

        <div class="cart-layout-grid" id="cart-layout-grid">
            <!-- Left: Product List -->
            <div class="cart-box list-box">
                <div class="list-header">
                    <i data-lucide="list"></i> <span id="list-header-count">Danh sách sản phẩm (0)</span>
                </div>
                <div class="cart-items" id="cart-list">
                    <!-- Items will be injected here -->
                </div>
            </div>

            <!-- Right: Summary -->
            <div class="summary-wrapper">
                <div class="cart-box summary-box">
                    <div class="summary-header">
                        <i data-lucide="receipt"></i> Tóm tắt đơn hàng
                    </div>
                    <div class="summary-content">
                        <div class="summary-row">
                            <span id="summary-count-text">Tạm tính (0 sản phẩm)</span>
                            <span id="subtotal" style="font-weight: 700;">0đ</span>
                        </div>
                        <div class="summary-divider"></div>
                        <div class="summary-row total-row">
                            <span>Tổng cộng</span>
                            <span class="total-price" id="final-total">0đ</span>
                        </div>
                    </div>
                </div>
                <button class="checkout-btn-main" onclick="alert('Chuyển đến trang thanh toán...')">MUA HÀNG</button>
            </div>
        </div>
        
        <!-- Empty State -->
        <div id="empty-cart-state" class="cart-box" style="display: none; text-align: center; padding: 60px;">
            <i data-lucide="shopping-cart" style="width: 60px; height: 60px; color: #ccc; margin-bottom: 20px;"></i>
            <h3 style="margin-top: 0;">Giỏ hàng của bạn đang trống</h3>
            <p style="color: #777;">Hãy tiếp tục khám phá các đặc sản hấp dẫn nhé!</p>
            <button class="continue-btn" onclick="window.location.href='specialties.html'" style="margin: 20px auto 0; width: fit-content; background: var(--primary); color: white; border: none;">Tiếp tục mua sắm</button>
        </div>
    </main>

    <script>
        let cartItems = [
            { id: 1, name: "Kẹo Dừa Bến Tre", price: 45000, qty: 2, image: "img/image.png", type: "Đặc sản", variant: "Hộp 500g" },
            { id: 2, name: "Bánh Phồng Sơn Đốc", price: 65000, qty: 1, image: "img/image copy.png", type: "Đặc sản", variant: "Túi 10 cái" },
            { id: 5, name: "Vú Sữa Lò Rèn", price: 95000, qty: 3, image: "https://th.bing.com/th/id/R.a78476ddac2710a2bec92ec33474e4c9?rik=YOPVhaYCdEQd9g&pid=ImgRaw&r=0", type: "Trái cây tươi", variant: "Hộp 1kg" }
        ];

        function renderCart() {
            const list = document.getElementById('cart-list');
            const layoutGrid = document.getElementById('cart-layout-grid');
            const emptyState = document.getElementById('empty-cart-state');
            
            const totalQty = cartItems.reduce((sum, item) => sum + item.qty, 0);
            
            document.getElementById('header-badge').innerText = cartItems.length;
            const navCartCount = document.querySelector('.cart-count');
            if (navCartCount) navCartCount.innerText = cartItems.length;
            document.getElementById('header-count').innerText = cartItems.length + " sản phẩm";
            document.getElementById('list-header-count').innerText = "Danh sách sản phẩm (" + cartItems.length + ")";
            document.getElementById('summary-count-text').innerText = "Tạm tính (" + totalQty + " sản phẩm)";

            if (cartItems.length === 0) {
                layoutGrid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            layoutGrid.style.display = 'grid';
            emptyState.style.display = 'none';

            list.innerHTML = cartItems.map(item => `
                <div class="cart-item-row">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="item-details">
                        <h3>${item.name}</h3>
                        <p class="item-variant"><i data-lucide="gift"></i> ${item.variant} - ${item.type}</p>
                        <div class="price-qty-row">
                            <div class="item-price">
                                <span class="current-price">${item.price.toLocaleString('vi-VN')}đ</span>
                            </div>
                            <div class="qty-selector">
                                <button onclick="updateQty(${item.id}, -1)">-</button>
                                <input type="text" value="${item.qty}" readonly>
                                <button onclick="updateQty(${item.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            updateSummary();
            lucide.createIcons();
        }

        function updateQty(id, delta) {
            const item = cartItems.find(i => i.id === id);
            if (item) {
                if (item.qty + delta <= 0) {
                    removeItem(id);
                } else {
                    item.qty += delta;
                    renderCart();
                }
            }
        }

        function removeItem(id) {
            cartItems = cartItems.filter(i => i.id !== id);
            renderCart();
        }

        function updateSummary() {
            const subtotal = cartItems.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('subtotal').innerText = subtotal.toLocaleString('vi-VN') + 'đ';
            document.getElementById('final-total').innerText = subtotal.toLocaleString('vi-VN') + 'đ';
        }

        renderCart();
        lucide.createIcons();
    </script>
</body>
</html>
